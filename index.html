<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schichtplan Fest</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    // 🔧 HIER DEINE FIREBASE DATEN EINTRAGEN
    const firebaseConfig = {
      apiKey: "AIzaSyBclkgfTQR9ap_HH_k3u9LSL4INDYwyHYY",
      authDomain: "kg-schichtplan.firebaseapp.com",
      databaseURL: "https://kg-schichtplan-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "kg-schichtplan",
      storageBucket: "kg-schichtplan.firebasestorage.app",
      messagingSenderId: "29390823188",
      appId: "1:29390823188:web:64907424fcf47bd1bf6c01"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <style>
    body { font-family: Arial, sans-serif; margin: 15px; font-size: 14px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #999; padding: 6px; text-align: center; }
    input { width: 90%; }
  </style>
</head>
<body>

<h1>Schichtplan</h1>
<div id="app"></div>

<script>
const plan = {
  Samstag: ["14-18", "18-22"],
  Sonntag: ["10-14", "14-18"]
};

function createTable() {
  const app = document.getElementById("app");

  for (const day in plan) {
    const h2 = document.createElement("h2");
    h2.textContent = day;
    app.appendChild(h2);

    const table = document.createElement("table");

    plan[day].forEach(time => {
      const tr = document.createElement("tr");

      const tdTime = document.createElement("td");
      tdTime.textContent = time;
      tr.appendChild(tdTime);

      const input = document.createElement("input");
      const key = day + "_" + time;

      // 🔄 LIVE DATEN LADEN
      db.ref("plan/" + key).on("value", snap => {
        if (snap.exists()) {
          input.value = snap.val();
        }
      });

      // 💾 SPEICHERN
      input.addEventListener("change", () => {
        db.ref("plan/" + key).set(input.value);
      });

      const td = document.createElement("td");
      td.appendChild(input);
      tr.appendChild(td);

      table.appendChild(tr);
    });

    app.appendChild(table);
  }
}

createTable();
</script>

</body>
</html>
