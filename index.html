<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schichtplan Fest</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 15px; font-size: 14px; }
    header { display: flex; align-items: center; margin-bottom: 15px; }
    header img { max-height: 60px; margin-right: 20px; }
    header div { font-size: 18px; font-weight: bold; }
    h2 { margin-top: 25px; margin-bottom: 10px; font-size: 16px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 15px; }
    th, td { border: 1px solid #999; padding: 6px; text-align: center; vertical-align: middle; }
    th { background: #eee; font-size: 13px; }
    input { width: 85%; padding: 3px; margin-bottom: 2px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }
    button { margin-top: 8px; padding: 5px 10px; font-size: 13px; cursor: pointer; margin-right: 8px; }
    #config { margin-bottom: 10px; }
    #config input { width: auto; }

    /* Farbige Eingabefelder je Aufgabe */
    input.kasse { background-color: #ADD8e6; color: black; }
    input.grill { background-color: #C0C0C0; color: black; }
    input.imbiss { background-color: #F08080; color: black; }
    input.theke { background-color: #FFD700; color: black; }
    input.kuchen { background-color: #FFB6C1; color: black; }

    /* Kleiner Ä-Button */
    .edit-btn {
      display: none;
      margin-left: 2px;
      padding: 1px 4px;
      font-size: 10px;
      cursor: pointer;
      background-color: #ccc;
      border: none;
      border-radius: 3px;
    }

    /* Druckfreundliches Layout */
    @media print {
      #config, button { display: none !important; }
      input { border: none; text-align: center; font-weight: bold; background: none !important; width: 100%; font-size: 20px; }
      input::placeholder { color: transparent; }
      body { margin: 0; font-size: 14px; }
      header { border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
      h1 { font-size: 20px; margin: 0; }
      h2 { font-size: 18px; margin: 10px 0 6px; }

      table { page-break-inside: avoid; width: 100%; }
      thead { display: table-header-group; }
      .edit-btn { display: none !important; }

      .day-container {
        page-break-before: always;
        page-break-inside: avoid;
      }
      .day-container:first-of-type {
        page-break-before: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <img id="logo" src="logo.png" alt="Fest Logo" onerror="this.style.display='none'">
    <div>
      <h1>Schichtplan für das Pfingstfest</h1>
      <div id="orgName">Vorstand KG Rot-Weiß Meindorf</div>
      <div id="eventDetails">Meindorf • 23.–25. Mai 2026</div>
    </div>
  </header>

  <div id="config">
    <label>Vereinsname: <input type="text" id="orgNameInput" placeholder="Name eingeben"></label>
    <label> Veranstaltungsdetails: <input type="text" id="eventDetailsInput" placeholder="Ort & Datum"></label>
    <label> Logo wählen: <input type="file" id="logoInput" accept="image/*"></label>
    <button onclick="saveConfig()">Übernehmen</button>
    <button onclick="resetPlan()">Zurücksetzen</button>
    <button onclick="window.print()">Drucken</button>
  </div>

  <script>
    const CHANGE_PASSWORD = "ändern"; // Passwort zum Ändern einzelner Einträge
    const RESET_PASSWORD = "reset";  // Passwort zum kompletten Zurücksetzen

    const plan = {
      Samstag: { date: "23. Mai 2026", times: ["14:00–18:00", "18:00–22:00", "22:00–00:00"] },
      Sonntag: { date: "24. Mai 2026", times: ["10:00–14:00", "14:00–18:00", "18:00–22:00", "22:00–00:00"] },
      Montag:  { date: "25. Mai 2026", times: ["10:00–14:00", "14:00–18:00"] }
    };

    const tasks = [
      { name: "Kasse", count: 1 },
      { name: "Grill", count: 1 },
      { name: "Imbiss", count: 3 },
      { name: "Theke", count: 4 },
      { name: "Kuchen", count: 3, days: ["Sonntag", "Montag"], times: ["10:00–14:00", "14:00–18:00"] }
    ];

    window.addEventListener("DOMContentLoaded", () => {
      const savedOrg = localStorage.getItem("orgName");
      if (savedOrg) {
        document.getElementById("orgName").textContent = savedOrg;
        document.getElementById("orgNameInput").value = savedOrg;
      }
      const savedDetails = localStorage.getItem("eventDetails");
      if (savedDetails) {
        document.getElementById("eventDetails").textContent = savedDetails;
        document.getElementById("eventDetailsInput").value = savedDetails;
      }
      const savedLogo = localStorage.getItem("logoData");
      if (savedLogo) {
        document.getElementById("logo").src = savedLogo;
      }
      for (const day in plan) {
        createTable(day, plan[day]);
      }
    });

    function saveConfig() {
      const orgName = document.getElementById("orgNameInput").value.trim();
      if (orgName) {
        document.getElementById("orgName").textContent = orgName;
        localStorage.setItem("orgName", orgName);
      }
      const details = document.getElementById("eventDetailsInput").value.trim();
      if (details) {
        document.getElementById("eventDetails").textContent = details;
        localStorage.setItem("eventDetails", details);
      }
      const file = document.getElementById("logoInput").files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById("logo").src = e.target.result;
          localStorage.setItem("logoData", e.target.result);
        };
        reader.readAsDataURL(file);
      }
    }

    function createTable(day, dayInfo) {
      const container = document.createElement("div");
      container.classList.add("day-container");

      const heading = document.createElement("h2");
      heading.textContent = `${day} (${dayInfo.date})`;
      container.appendChild(heading);

      const table = document.createElement("table");
      table.setAttribute("data-day", day);

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      const th1 = document.createElement("th");
      th1.textContent = "Uhrzeit";
      headerRow.appendChild(th1);

      tasks.forEach(task => {
        if (task.days && !task.days.includes(day)) return;
        const th = document.createElement("th");
        th.textContent = task.name;
        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      dayInfo.times.forEach(shift => {
        const row = document.createElement("tr");
        const timeCell = document.createElement("td");
        timeCell.textContent = shift;
        row.appendChild(timeCell);

        tasks.forEach(task => {
          if (task.days && !task.days.includes(day)) return;
          if (task.times && !task.times.includes(shift)) return;

          const cell = document.createElement("td");
          for (let i = 0; i < task.count; i++) {
            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = task.name + " " + (i + 1);
            input.classList.add(task.name.toLowerCase());

            const key = `${day}_${shift}_${task.name}_${i}`;
            const savedValue = localStorage.getItem(key);
            if (savedValue) {
              input.value = savedValue;
              input.disabled = true;
            }

            const editBtn = document.createElement("button");
            editBtn.textContent = "Ä";
            editBtn.classList.add("edit-btn");

            if (input.value.trim() !== "") editBtn.style.display = "inline-block";

            editBtn.addEventListener("click", () => {
              const pw = prompt("Bitte Passwort eingeben, um diesen Eintrag zu ändern:");
              if (pw === CHANGE_PASSWORD) {
                input.disabled = false;
                input.focus();
              } else {
                alert("Falsches Passwort!");
              }
            });

            input.addEventListener("change", () => {
              localStorage.setItem(key, input.value);
              if (input.value.trim() !== "") {
                input.disabled = true;
                editBtn.style.display = "inline-block";
              } else {
                input.disabled = false;
                editBtn.style.display = "none";
              }
            });

            cell.appendChild(input);
            cell.appendChild(editBtn);
            if (i < task.count - 1) cell.appendChild(document.createElement("br"));
          }
          row.appendChild(cell);
        });

        tbody.appendChild(row);
      });

      table.appendChild(tbody);
      container.appendChild(table);
      document.body.appendChild(container);
    }

    function resetPlan() {
      const pw = prompt("Passwort zum Zurücksetzen eingeben:");
      if (pw === RESET_PASSWORD) {
        if (confirm("Möchten Sie wirklich alle Einträge löschen?")) {
          localStorage.clear();
          location.reload();
        }
      } else {
        alert("Falsches Passwort!");
      }
    }
  </script>
</body>
</html>
